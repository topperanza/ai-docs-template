site_name: Project Docs
site_description: Documentation site built with the ai-docs-template triple-agent workflow
site_url: https://OWNER.github.io/REPO_NAME/  # Public Pages profile: update to your Pages URL.
                                              # Private/local profile: leave as placeholder or remove.
docs_dir: docs
site_dir: site

# Repository link shown in the site header — optional for both profiles.
# Uncomment and update for public repos or any repo where a source link is useful.
# repo_name: OWNER/REPO_NAME
# repo_url: https://github.com/OWNER/REPO_NAME

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Setup:
      - Public Pages: setup/public-pages.md
      - Private / Local Build: setup/private-local.md
  - Contributing: CONTRIBUTING.md

# Update nav when you add pages. Example:
# nav:
#   - Home: index.md
#   - Getting Started:
#       - Installation: getting-started/installation.md
#       - Configuration: getting-started/configuration.md
#   - Reference: reference/index.md
#   - Contributing: CONTRIBUTING.md
